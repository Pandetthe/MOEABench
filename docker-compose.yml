services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: moeabench
      POSTGRES_USER: moeabench
      POSTGRES_PASSWORD: moeabench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moeabench"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/moeabench?user=moeabench&password=moeabench
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
